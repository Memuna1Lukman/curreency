<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Frontend Mentor | FX Checker</title>
</head>
<body>

  <header class="header">
    <div class="header-container">
      <a href="/" class="logo-link">
        <img src="assets/images/logo.svg" alt="FX Checker Logo" class="logo">
      </a>
      <p class="currency-status">
        <span id="dynamic-number"></span>Currencies &middot; EOD &middot; ECB data 
      </p>
    </div>
  </header>
  <main class="main">
    <section class="ticker-wrap" id="live-markets" aria-label="Live Markets">
      <div class="ticker-title">&middot; Live markets</div>
      <div class="ticker-track" id="ticker-shelf"></div>
    </section>

    <section class="converter-section">
      <h2>Check the Rate</h2>
      
      <form class="converter-card" action="#">
        <div class="converter-inputs">
          
          <div class="input-group">
            <label for="send-amount">Send</label>
            <div class="input-control-wrapper">
              <input id="send-amount" value="1000" placeholder="0.00" inputmode="numeric" pattern="[0-9]*">
              <div class="currency-select" tabindex="0" role="combobox" aria-expanded="false" aria-label="country">
                <div class="selected-option" id="selected-option">
                    <div id="send-images"></div> 
                    <span id="send-currency-code">AUD</span>
                    <img src="assets/images/icon-chevron-down.svg" alt="">
                </div>
                <ul class="option-list" id="send-list"></ul>
              </div>
            </div>
          </div>

          <div class="swap">
            <button type="button" class="btn-swap" aria-label="Swap currencies" id="swap1">
              <img src="assets/images/icon-exchange.svg" alt="Swap">
            </button>
            <button type="button" class="btnSwap" aria-label="Swap currencies" id="swap2">
              <img src="assets/images/icon-exchange-vertical.svg" alt="Swap">
            </button>
          </div>
          

          <div class="input-group">
            <label for="receive-amount">Receive</label>
            <div class="input-control-wrapper">
              <input id="receive-amount" value="853.02" readonly inputmode="numeric" pattern="[0-9]*"> 
              <div class="currency-select" tabindex="0" role="combobox" aria-expanded="false" aria-label="country">
                <div class="selected-option" id="receive-option">
                  <div id="receive-images"></div>
                  <span id="receive-currency-code">BRL</span>
                  <img src="assets/images/icon-chevron-down.svg" alt="">
                </div>
                <ul class="option-list" id="receive-list"></ul>
              </div>
            </div>
          </div>

        </div> <div class="converter-actions-row">
          <div class="rate-info">
              <p class="rate-text" id="rate-text">1 AUD = 3.6196 BRL</p>
          </div>
          <div class="action-buttons">
            <button type="button" class="btn btn-secondary btn-favorite" id="fav-btn">
              <img src="assets/images/icon-star.svg" alt="stars" id="fav-img">
              <span id="fav-span">Favorite</span>
            </button>
            <button type="submit" class="btn btn-primary btn-log">
              <span>Log Conversion</span>
            </button>
          </div>
        </div>  
      </form>
    </section>
<!-- =========================THE LINKS FOR DASHBOARD================================ -->
   <section class="panel-section">
    <nav class="dashboard-tabs" id="dashboard">
      <button type="button" class="tab-btn active" data-target="#history-panel">History</button>
      <button type="button" class="tab-btn" data-target="#compare-panel">Compare</button>
      <button type="button" class="tab-btn" data-target="#favorite-panel">Favorites</button>
      <button type="button" class="tab-btn" data-target="#log-panel">Log</button> 
    </nav>

  <div id="all-panels">
    
    <div id="history-panel" class="panel active">
      
      <div class="history-top-row">
        <div class="metric-grid">
          <section class="metric-card">
            <span class="metric-label">Open</span>
            <p class="metric-value" id="metric-open">0.8516</p>
          </section>
          <section class="metric-card">
            <span class="metric-label">Last</span>
            <p class="metric-value" id="metric-last">0.856</p>
          </section>
          <section class="metric-card">
            <span class="metric-label">Change</span>
            <p class="metric-value" id="metric-change" class="positive">+0.0014</p>
          </section>
          <section class="metric-card">
            <span class="metric-label">% Change</span>
            <p class="metric-value" id="metric-perchange" class="positive">+0.16%</p>
          </section>
          
          
        </div>
        <section class="chart-filters">
            <div class="filter-btn">1D</div>
            <div class="filter-btn active">1W</div>
            <div class="filter-btn">1M</div>
            <div class="filter-btn">1Y</div>
        </section>
      </div>

      <div id="canvas" class="canvas">
        <canvas id="charts"></canvas>
      </div>
      
    </div>

    <div id="compare-panel" class="panel">
      <p>This is a div</p>
    </div>
    <div id="favorite-panel" class="panel">
      <section id="fav-section"></section>
    </div>
    <div id="log-panel" class="panel"></div>

  </div>
</section>
    
  </main>
  <script src="script.js"></script>
</body>
</html>
